[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "lib"]
test = "test"
solc = "0.8.20"
evm_version = "shanghai"
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"

[fuzz]
runs = 256
